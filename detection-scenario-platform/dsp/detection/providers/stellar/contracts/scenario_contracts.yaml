    query_dimensions:
      source_ip: required
      destination_ip: optional
      hostname: required
      username: nice_to_have
      protocol: required
      port: required
      time_range: required
    fallback:
      missing_source_ip: widen_time_window
      missing_hostname: use_analytics_type_filter
      empty_alerts: rely_on_analytics_only

