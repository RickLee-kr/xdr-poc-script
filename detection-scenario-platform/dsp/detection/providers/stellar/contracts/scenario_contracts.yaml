# Stellar Detection Contract Layer — scenario contracts (Phase 10).
# Loaded by contracts/contract_loader.py — do NOT hardcode in adapter logic.

version: "1.0.0"
vendor: stellar

scenarios:
  dns_tunnel:
    category: DNS Tunnel
    confidence: HIGH
    search_window_minutes: 30
    detection_model_id: stellar.dns_tunnel
    required_evidence:
      - alert
      - analytics
      - entity
    optional_evidence:
      - timeline
    alert_families:
      - DNS Tunnel
      - DNS Exfiltration
    entity_types:
      - ip
      - host
      - domain
    analytics_types:
      - dns_query_volume_anomaly
      - long_subdomain_pattern
    query_dimensions:
      source_ip: required
      destination_ip: optional
      hostname: required
      username: nice_to_have
      protocol: required
      port: required
      time_range: required
    fallback:
      missing_source_ip: widen_time_window_and_entity_only
      missing_hostname: use_protocol_and_time_only
      empty_alerts: rely_on_analytics_and_entities

  dga:
